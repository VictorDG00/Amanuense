services:
  amanuense:
    build:
      context: .
      target: web
    container_name: amanuense
    restart: always
    expose:
      - "80"
    volumes:
      - ./output:/app/output
    depends_on:
      - amanuense-api
    networks:
      - vps-proxy

  amanuense-api:
    build:
      context: .
      target: api
    container_name: amanuense-api
    restart: always
    expose:
      - "8000"
    volumes:
      - ./corpus:/app/corpus
      - ./output:/app/output
      - ./intermediate:/app/intermediate
      - ./data:/app/data
    env_file: .env
    environment:
      LEGISLACAO_DATABASE_URL: postgresql://amanuense:amanuense@postgres:5432/legislacao
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vps-proxy

  postgres:
    image: postgres:16-alpine
    container_name: amanuense-postgres
    restart: always
    environment:
      POSTGRES_DB: legislacao
      POSTGRES_USER: amanuense
      POSTGRES_PASSWORD: amanuense
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amanuense -d legislacao"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vps-proxy

volumes:
  pgdata:

networks:
  vps-proxy:
    external: true
